# Blueprint Render (gratuit) — Black Pater
# https://render.com/docs/blueprint-spec
databases:
  - name: BlackPater-db
    plan: free
    databaseName: BlackPater
    user: BlackPater

services:
  # BACKEND — Web Service Python (dossier backend/)
  - type: web
    name: BlackPater-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: BlackPater-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        value: Admin@2026
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@blackpater.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false

  # FRONTEND — Static Site (dossier frontend/)
  - type: web
    name: BlackPater-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://patermessager.onrender.com/api
